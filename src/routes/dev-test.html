<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App test</title>
<style>
* { box-sizing: border-box; }
body  { font-family: monospace; padding: 1rem; background: #111; color: #eee; font-size: 13px; line-height: 1.5; }
h1    { font-size: 1rem; margin: 0 0 .5rem; }
.ok   { color: #4f4; }
.fail { color: #f66; }
.skip { color: #888; }
.info { color: #666; }
pre   { margin: 0; }
</style>
</head>
<body>
<h1>App — <span id="st">running…</span></h1>
<pre id="out"></pre>

<script type="module">
const out = document.getElementById('out');
const st  = document.getElementById('st');

// When served via a reverse proxy at e.g. /_dev/_test, all internal URLs
// must be prefixed with that base path and carry the auth token.
const _tok      = new URLSearchParams(location.search).get('token') ?? '';
const _adminTok = new URLSearchParams(location.search).get('admin_token') ?? '';
const _base     = location.pathname.replace(/\/_test.*$/, '');
function url(path) {
  const u = new URL(_base + path, location.origin);
  if (_tok) u.searchParams.set('token', _tok);
  return u.toString();
}
// Authorization header for admin API calls.
// Pass ?admin_token=<ADMIN_TOKEN> to enable authenticated test levels.
function authHdr() {
  return _adminTok ? { Authorization: `Bearer ${_adminTok}` } : {};
}

function log(cls, txt) {
  const s = document.createElement('span');
  s.className = cls; s.textContent = txt + '\n';
  out.appendChild(s);
}
function section(title) { log('info', `\n── ${title} ──`); }
function pass(name, detail = '') { return { name, ok: true,  detail }; }
function fail(name, e)           { return { name, ok: false, detail: `${e?.constructor?.name ?? 'Error'}: ${e?.message ?? e}` }; }

// Run an inline blob worker, return its postMessage result.
function runWorker(src) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(new Blob([src], { type: 'application/javascript' }));
    const w = new Worker(url);
    w.onmessage = e => { URL.revokeObjectURL(url); w.terminate(); resolve(e.data); };
    w.onerror   = e => { URL.revokeObjectURL(url); w.terminate(); reject(new Error(e.message ?? 'worker error')); };
    w.postMessage(null);
  });
}

// ── Level 1: raw OPFS APIs ──────────────────────────────────────────────────
async function level1() {
  section('Level 1 — raw OPFS');
  const results = [];

  // Main-thread storage handle
  try {
    const root = await navigator.storage.getDirectory();
    results.push(pass('main:getDirectory'));

    // createWritable (main thread — async writable stream)
    try {
      const fh = await root.getFileHandle('_l1_writable', { create: true });
      try {
        const w = await fh.createWritable();
        await w.write('writable-ok'); await w.close();
        const text = await (await fh.getFile()).text();
        results.push(pass('main:createWritable', text === 'writable-ok' ? text : `MISMATCH: ${text}`));
      } catch(e) { results.push(fail('main:createWritable', e)); }
      await root.removeEntry('_l1_writable').catch(() => {});
    } catch(e) { results.push(fail('main:getFileHandle', e)); }
  } catch(e) {
    results.push(fail('main:getDirectory', e));
  }

  // Worker-thread: createSyncAccessHandle
  try {
    const workerResults = await runWorker(`
self.onmessage = async () => {
  const res = [];
  try {
    const root = await navigator.storage.getDirectory();
    res.push({ name: 'worker:getDirectory', ok: true, detail: '' });
    try {
      const fh = await root.getFileHandle('_l1_sah', { create: true });
      try {
        const sah = await fh.createSyncAccessHandle();
        const enc = new TextEncoder().encode('sah-ok');
        sah.write(enc, { at: 0 }); sah.flush();
        const dec = new Uint8Array(enc.byteLength);
        sah.read(dec, { at: 0 }); sah.close();
        const got = new TextDecoder().decode(dec);
        res.push({ name: 'worker:createSyncAccessHandle', ok: got === 'sah-ok', detail: got });
      } catch(e) { res.push({ name: 'worker:createSyncAccessHandle', ok: false, detail: e.constructor.name+': '+e.message }); }
      await root.removeEntry('_l1_sah').catch(() => {});
    } catch(e) { res.push({ name: 'worker:getFileHandle', ok: false, detail: e.constructor.name+': '+e.message }); }
  } catch(e) { res.push({ name: 'worker:getDirectory', ok: false, detail: e.constructor.name+': '+e.message }); }
  self.postMessage(res);
};
    `);
    results.push(...workerResults);
  } catch(e) { results.push(fail('worker:init', e)); }

  return results;
}

// ── Level 2: app worker — atomic write/readback/remove ──────────────────────
async function level2() {
  section('Level 2 — app worker (opfs-worker.js)');

  const probe = await fetch(url('/static/admin/opfs-worker.js'), { method: 'HEAD' });
  if (!probe.ok) {
    log('skip', '⊘ bundle missing — run npm run build:admin');
    return [{ name: 'worker:load', ok: null }];
  }

  const results = [];
  const worker = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
  const call = msg => new Promise((resolve, reject) => {
    worker.onmessage = e => resolve(e.data);
    worker.onerror   = e => reject(new Error(e.message ?? 'worker error'));
    worker.postMessage(msg);
  });

  try {
    // Write
    const r1 = await call({ id: 'l2a', op: 'write', path: '_test/probe.txt', data: 'app-worker-ok' });
    results.push({ name: 'worker:write', ok: r1.ok, detail: r1.ok ? '' : (r1.debug ?? r1.error) });

    if (r1.ok) {
      // Readback via direct OPFS from main thread
      const root = await navigator.storage.getDirectory();
      const dir  = await root.getDirectoryHandle('_test', { create: false });
      const fh   = await dir.getFileHandle('probe.txt', { create: false });
      const text = await (await fh.getFile()).text();
      results.push({ name: 'worker:readback', ok: text === 'app-worker-ok', detail: text });

      // Remove
      const r2 = await call({ id: 'l2b', op: 'remove', path: '_test/probe.txt' });
      results.push({ name: 'worker:remove', ok: r2.ok, detail: r2.ok ? '' : r2.error });
      await root.removeEntry('_test', { recursive: true }).catch(() => {});
    }
  } catch(e) {
    results.push(fail('worker:op', e));
  } finally {
    worker.terminate();
  }
  return results;
}

// ── Level 3: persistence across worker restart ───────────────────────────────
// Write via one worker instance, terminate it, spin up a fresh one,
// read back. Verifies data survives beyond the originating worker's lifetime.
async function level3() {
  section('Level 3 — persistence across worker restart');
  const results = [];

  const w1 = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
  const call1 = msg => new Promise((resolve, reject) => {
    w1.onmessage = e => resolve(e.data);
    w1.onerror   = e => reject(new Error(e.message));
    w1.postMessage(msg);
  });

  try {
    const r1 = await call1({ id: 'l3a', op: 'write', path: '_test/persist.txt', data: 'persist-ok' });
    results.push({ name: 'persist:write', ok: r1.ok, detail: r1.ok ? '' : (r1.debug ?? r1.error) });
    w1.terminate();

    if (!r1.ok) return results;

    // Fresh worker instance — no shared state with w1
    const w2 = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
    const call2 = msg => new Promise((resolve, reject) => {
      w2.onmessage = e => resolve(e.data);
      w2.onerror   = e => reject(new Error(e.message));
      w2.postMessage(msg);
    });

    try {
      // Read back via main-thread OPFS (worker only writes; reads stay main-thread)
      const root = await navigator.storage.getDirectory();
      const dir  = await root.getDirectoryHandle('_test', { create: false });
      const fh   = await dir.getFileHandle('persist.txt', { create: false });
      const text = await (await fh.getFile()).text();
      results.push({ name: 'persist:readback-after-restart', ok: text === 'persist-ok', detail: text });

      // Overwrite with w2
      const r2 = await call2({ id: 'l3b', op: 'write', path: '_test/persist.txt', data: 'overwrite-ok' });
      results.push({ name: 'persist:overwrite', ok: r2.ok, detail: r2.ok ? '' : (r2.debug ?? r2.error) });

      if (r2.ok) {
        // Re-read the file handle since content changed
        const fh2   = await dir.getFileHandle('persist.txt', { create: false });
        const text3 = await (await fh2.getFile()).text();
        results.push({ name: 'persist:readback-overwrite', ok: text3 === 'overwrite-ok', detail: text3 });
      }

      // Cleanup
      const r3 = await call2({ id: 'l3c', op: 'remove', path: '_test/persist.txt' });
      results.push({ name: 'persist:cleanup', ok: r3.ok, detail: r3.ok ? '' : r3.error });
      await root.removeEntry('_test', { recursive: true }).catch(() => {});
    } finally {
      w2.terminate();
    }
  } catch(e) {
    w1.terminate();
    results.push(fail('persist:op', e));
  }
  return results;
}

// ── Level 4: nested directory paths ─────────────────────────────────────────
// The app worker's walk() traverses multi-segment paths. Exercise it with
// two levels of nesting and verify correct file resolution.
async function level4() {
  section('Level 4 — nested directory paths');
  const results = [];

  const worker = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
  const call = msg => new Promise((resolve, reject) => {
    worker.onmessage = e => resolve(e.data);
    worker.onerror   = e => reject(new Error(e.message));
    worker.postMessage(msg);
  });

  const paths = [
    '_test/a.txt',
    '_test/sub/b.txt',
    '_test/sub/deep/c.txt'
  ];

  try {
    // Write all
    for (const [i, p] of paths.entries()) {
      const r = await call({ id: `l4w${i}`, op: 'write', path: p, data: `content:${p}` });
      results.push({ name: `nested:write:${p}`, ok: r.ok, detail: r.ok ? '' : (r.debug ?? r.error) });
    }

    // Read back each via main-thread OPFS traversal
    const root = await navigator.storage.getDirectory();
    for (const p of paths) {
      try {
        const parts = p.split('/');
        let dir = root;
        for (const seg of parts.slice(0, -1)) dir = await dir.getDirectoryHandle(seg);
        const fh   = await dir.getFileHandle(parts.at(-1));
        const text = await (await fh.getFile()).text();
        results.push({ name: `nested:readback:${p}`, ok: text === `content:${p}`, detail: text });
      } catch(e) {
        results.push(fail(`nested:readback:${p}`, e));
      }
    }

    // Remove root, verify it's gone
    await root.removeEntry('_test', { recursive: true }).catch(() => {});
    let gone = false;
    try { await root.getDirectoryHandle('_test'); } catch { gone = true; }
    results.push({ name: 'nested:cleanup', ok: gone, detail: gone ? '' : '_test dir still present' });
  } catch(e) {
    results.push(fail('nested:op', e));
  } finally {
    worker.terminate();
  }
  return results;
}

// ── Level 5: large payload ───────────────────────────────────────────────────
// Write 1 MiB, read back and verify byte count + spot-check content.
async function level5() {
  section('Level 5 — large payload (1 MiB)');
  const results = [];

  const worker = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
  const call = msg => new Promise((resolve, reject) => {
    worker.onmessage = e => resolve(e.data);
    worker.onerror   = e => reject(new Error(e.message));
    worker.postMessage(msg);
  });

  // 1 MiB of repeating ASCII — deterministic, easy to spot-check
  const PAYLOAD = 'x'.repeat(1024 * 1024);

  try {
    const t0 = performance.now();
    const r = await call({ id: 'l5a', op: 'write', path: '_test/large.txt', data: PAYLOAD });
    const writeMs = Math.round(performance.now() - t0);
    results.push({ name: 'large:write', ok: r.ok, detail: r.ok ? `${writeMs}ms` : (r.debug ?? r.error) });

    if (r.ok) {
      const root = await navigator.storage.getDirectory();
      const dir  = await root.getDirectoryHandle('_test', { create: false });
      const fh   = await dir.getFileHandle('large.txt', { create: false });
      const file = await fh.getFile();
      const t1 = performance.now();
      const text = await file.text();
      const readMs = Math.round(performance.now() - t1);
      const sizeOk = text.length === PAYLOAD.length;
      const contentOk = text === PAYLOAD;
      results.push({
        name: 'large:readback',
        ok: sizeOk && contentOk,
        detail: `${text.length} bytes, ${readMs}ms${contentOk ? '' : ' CONTENT MISMATCH'}`
      });
      await root.removeEntry('_test', { recursive: true }).catch(() => {});
    }
  } catch(e) {
    results.push(fail('large:op', e));
  } finally {
    worker.terminate();
  }
  return results;
}

// ── Level 6: atomic swap — simulate concurrent write ────────────────────────
// Fire two write ops to the same path from the same worker in quick
// succession. Both should succeed (the second wins); no corruption.
async function level6() {
  section('Level 6 — rapid sequential writes (last-write-wins)');
  const results = [];

  const worker = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
  // Dispatch both messages before either resolves so they queue inside the worker.
  const responses = {};
  worker.onmessage = e => { responses[e.data.id] = e.data; };

  worker.postMessage({ id: 'l6a', op: 'write', path: '_test/race.txt', data: 'first' });
  worker.postMessage({ id: 'l6b', op: 'write', path: '_test/race.txt', data: 'second' });

  try {
    const [r1, r2] = await Promise.all([
      new Promise(res => { const iv = setInterval(() => { if (responses.l6a) { clearInterval(iv); res(responses.l6a); } }, 10); }),
      new Promise(res => { const iv = setInterval(() => { if (responses.l6b) { clearInterval(iv); res(responses.l6b); } }, 10); })
    ]);
    results.push({ name: 'race:both-completed', ok: r1.ok && r2.ok,
      detail: `r1=${r1.ok} r2=${r2.ok}${r1.ok ? '' : ' '+r1.error}${r2.ok ? '' : ' '+r2.error}` });

    if (r1.ok && r2.ok) {
      const root = await navigator.storage.getDirectory();
      const dir  = await root.getDirectoryHandle('_test', { create: false });
      const fh   = await dir.getFileHandle('race.txt', { create: false });
      const text = await (await fh.getFile()).text();
      // Either 'first' or 'second' is valid — worker serialises internally
      const valid = text === 'first' || text === 'second';
      results.push({ name: 'race:no-corruption', ok: valid, detail: `winner: "${text}"` });
      await root.removeEntry('_test', { recursive: true }).catch(() => {});
    }
  } catch(e) {
    results.push(fail('race:op', e));
  } finally {
    worker.terminate();
  }
  return results;
}

// ── Level 7: admin API — image upload ───────────────────────────────────────
// Uploads a tiny canvas-generated JPEG. Requires ?admin_token=<ADMIN_TOKEN>.
// Returns the image id for use by levels 8–9.
async function level7() {
  section('Level 7 — admin API: image upload');
  if (!_adminTok) {
    log('skip', '⊘ skipped — pass ?admin_token=<ADMIN_TOKEN> to enable');
    return [{ name: 'upload:auth', ok: null }];
  }
  const results = [];
  try {
    // Tiny 10×10 JPEG via canvas
    const c = document.createElement('canvas');
    c.width = 10; c.height = 10;
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'rgb(200,50,50)'; ctx.fillRect(0, 0, 10, 10);
    const blob = await new Promise((res, rej) =>
      c.toBlob(b => b ? res(b) : rej(new Error('toBlob empty')), 'image/jpeg', 0.8)
    );
    const fd = new FormData();
    fd.append('file', blob, 'test.jpg');
    const res = await fetch(url('/admin/upload'), {
      method: 'POST', body: fd, headers: authHdr()
    });
    const body = await res.text();
    if (!res.ok) {
      results.push(fail('upload:post', new Error(`${res.status} ${body}`)));
      return results;
    }
    const json = JSON.parse(body);
    results.push({ name: 'upload:post', ok: true, detail: `id=${json.id?.slice(0,12)}…` });
    results.push({ name: 'upload:id', ok: typeof json.id === 'string' && json.id.length === 64,
      detail: json.id?.length ? `len=${json.id.length}` : 'missing' });
    results._uploadId = json.id; // pass to level 8
  } catch(e) { results.push(fail('upload:op', e)); }
  return results;
}

// ── Level 8: admin API — crop commit ────────────────────────────────────────
// Commits a crop op + WebP bake against the image uploaded in level 7.
// This replicates the exact flow the editor uses, including canvas→WebP encode.
async function level8(imageId) {
  section('Level 8 — admin API: crop commit');
  if (!_adminTok || !imageId) {
    log('skip', !_adminTok ? '⊘ skipped — no admin_token' : '⊘ skipped — level 7 failed');
    return [{ name: 'commit:skip', ok: null }];
  }
  const results = [];
  try {
    // Bake: 8×8 WebP (crop {x:1,y:1,w:8,h:8} of the 10×10 original)
    const c = document.createElement('canvas');
    c.width = 8; c.height = 8;
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'rgb(100,150,200)'; ctx.fillRect(0, 0, 8, 8);
    let bakeBlob = await new Promise((res, rej) =>
      c.toBlob(b => b ? res(b) : rej(new Error('toBlob empty')), 'image/webp', 0.95)
    );

    // Log what format canvas produced; fall back to JPEG on iOS (mirrors production).
    // WebP is preferred; iOS Safari/Chrome fall back to JPEG which the server accepts.
    if (bakeBlob.type !== 'image/webp') {
      bakeBlob = await new Promise((res, rej) =>
        c.toBlob(b => b ? res(b) : rej(new Error('toBlob empty')), 'image/jpeg', 0.95)
      );
    }
    results.push({ name: 'commit:bake-format', ok: true, detail: `type=${bakeBlob.type}` });

    const ops = [{ type: 'crop', x: 1, y: 1, w: 8, h: 8 }];
    const fd = new FormData();
    fd.append('ops', JSON.stringify({ ops, redoStack: [] }));
    fd.append('bake', bakeBlob, `${imageId}.webp`);
    const res = await fetch(url(`/admin/sidecar/${imageId}/commit`), {
      method: 'POST', body: fd, headers: authHdr()
    });
    const body = await res.text();
    if (!res.ok) {
      results.push(fail('commit:post', new Error(`${res.status} ${body}`)));
      return results;
    }
    const json = JSON.parse(body);
    const op = json.ops?.[0];
    results.push({ name: 'commit:post', ok: res.ok, detail: `status=${res.status}` });
    results.push({ name: 'commit:ops-roundtrip', ok: op?.type === 'crop' && op?.x === 1 && op?.y === 1 && op?.w === 8 && op?.h === 8,
      detail: JSON.stringify(op) });
  } catch(e) { results.push(fail('commit:op', e)); }
  return results;
}

// ── Level 9: admin API — sidecar meta read-back ──────────────────────────────
// Reads back the sidecar after the crop commit and verifies ops are persisted.
async function level9(imageId) {
  section('Level 9 — admin API: sidecar meta read-back');
  if (!_adminTok || !imageId) {
    log('skip', !_adminTok ? '⊘ skipped — no admin_token' : '⊘ skipped — level 7/8 failed or WebP not supported');
    return [{ name: 'meta:skip', ok: null }];
  }
  const results = [];
  try {
    const res = await fetch(url(`/admin/sidecar/${imageId}/meta`), { headers: authHdr() });
    const body = await res.text();
    if (!res.ok) {
      results.push(fail('meta:get', new Error(`${res.status} ${body}`)));
      return results;
    }
    const json = JSON.parse(body);
    results.push({ name: 'meta:get', ok: true, detail: `${json.width}×${json.height} ${json.format}` });
    const op = json.ops?.[0];
    results.push({ name: 'meta:ops-persisted', ok: op?.type === 'crop' && op?.x === 1 && op?.y === 1 && op?.w === 8 && op?.h === 8,
      detail: JSON.stringify(op) });
    results.push({ name: 'meta:dims', ok: json.width === 10 && json.height === 10,
      detail: `${json.width}×${json.height}` });
  } catch(e) { results.push(fail('meta:op', e)); }
  return results;
}

// ── Level 10: canvas capability matrix ──────────────────────────────────────
// Probes browser canvas features the editor relies on. All results are
// informational (ok: true always) — they surface platform differences
// without gating the overall pass/fail. Safari/iOS specifics:
//   • canvas.toBlob('image/webp') → silently produces JPEG on iOS WebKit
//   • WebGL → available but limited to WebGL1 on older iOS; context can
//     be lost if too many contexts exist across tabs
//   • createImageBitmap → available iOS 15+; used by ingest-resize-client
async function level10() {
  section('Level 10 — canvas capability matrix');
  const results = [];

  // canvas.toBlob format matrix: what does this browser actually produce?
  const c = document.createElement('canvas');
  c.width = 4; c.height = 4;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3af'; ctx.fillRect(0, 0, 4, 4);
  for (const mime of ['image/webp', 'image/jpeg', 'image/png']) {
    try {
      const blob = await new Promise((res, rej) =>
        c.toBlob(b => b ? res(b) : rej(new Error('null blob')), mime, 0.9)
      );
      results.push({ name: `toBlob:${mime.split('/')[1]}`, ok: true,
        detail: `type=${blob.type} size=${blob.size}B` });
    } catch(e) { results.push(fail(`toBlob:${mime.split('/')[1]}`, e)); }
  }

  // WebGL probe: availability + renderer string (useful for diagnosing
  // perspective-transform failures; iOS limits max-texture-size).
  try {
    const gl = document.createElement('canvas').getContext('webgl');
    if (!gl) {
      results.push({ name: 'webgl:context', ok: true, detail: 'unavailable' });
    } else {
      const dbgInfo = gl.getExtension('WEBGL_debug_renderer_info');
      const renderer = dbgInfo
        ? gl.getParameter(dbgInfo.UNMASKED_RENDERER_WEBGL)
        : gl.getParameter(gl.RENDERER);
      const maxTex = gl.getParameter(gl.MAX_TEXTURE_SIZE);
      results.push({ name: 'webgl:context', ok: true, detail: `available` });
      results.push({ name: 'webgl:renderer', ok: true, detail: String(renderer) });
      results.push({ name: 'webgl:max-texture', ok: true, detail: `${maxTex}px` });
      // Lose the context immediately so we don't hit the browser's limit.
      const ext = gl.getExtension('WEBGL_lose_context');
      if (ext) ext.loseContext();
    }
  } catch(e) { results.push(fail('webgl:context', e)); }

  // createImageBitmap: used by ingest-resize-client for client-side resize.
  // iOS 15+ supports it; older iOS does not, causing silent fallback to raw upload.
  try {
    if (typeof createImageBitmap === 'undefined') {
      results.push({ name: 'createImageBitmap', ok: true, detail: 'unavailable' });
    } else {
      const src = document.createElement('canvas');
      src.width = 8; src.height = 8;
      src.getContext('2d').fillRect(0, 0, 8, 8);
      const blob = await new Promise((res, rej) =>
        src.toBlob(b => b ? res(b) : rej(new Error('null')), 'image/png')
      );
      const bmp = await createImageBitmap(blob);
      results.push({ name: 'createImageBitmap', ok: true,
        detail: `${bmp.width}×${bmp.height}` });
      bmp.close();
    }
  } catch(e) { results.push(fail('createImageBitmap', e)); }

  // OffscreenCanvas: used by ingest-resize-client for off-main-thread rendering.
  results.push({ name: 'OffscreenCanvas', ok: true,
    detail: typeof OffscreenCanvas !== 'undefined' ? 'available' : 'unavailable' });

  return results;
}

// ── Runner ───────────────────────────────────────────────────────────────────

function display(results) {
  for (const r of results) {
    if (r.ok === null) continue; // skipped level
    log(r.ok ? 'ok' : 'fail', `${r.ok ? '✓' : '✗'} ${r.name}${r.detail ? '  ' + r.detail : ''}`);
  }
}

async function run() {
  log('info', navigator.userAgent + '\n');
  const allResults = [];

  const l1 = await level1();
  display(l1); allResults.push(...l1);
  if (l1.some(r => !r.ok)) { finish('FAIL (level 1)', allResults); return; }

  const l2 = await level2();
  display(l2); allResults.push(...l2.filter(r => r.ok !== null));
  if (l2.some(r => r.ok === false)) { finish('FAIL (level 2)', allResults); return; }

  const hasWorker = l2.every(r => r.ok !== null); // false = bundle missing
  if (!hasWorker) { finish('PASS ✓ (levels 1–2, worker skipped)', allResults); return; }

  const l3 = await level3();
  display(l3); allResults.push(...l3);
  if (l3.some(r => !r.ok)) { finish('FAIL (level 3)', allResults); return; }

  const l4 = await level4();
  display(l4); allResults.push(...l4);
  if (l4.some(r => !r.ok)) { finish('FAIL (level 4)', allResults); return; }

  const l5 = await level5();
  display(l5); allResults.push(...l5);
  if (l5.some(r => !r.ok)) { finish('FAIL (level 5)', allResults); return; }

  const l6 = await level6();
  display(l6); allResults.push(...l6);
  if (l6.some(r => !r.ok)) { finish('FAIL (level 6)', allResults); return; }

  const l7 = await level7();
  display(l7); allResults.push(...l7.filter(r => r.ok !== null));
  if (l7.some(r => r.ok === false)) { finish('FAIL (level 7)', allResults); return; }
  const uploadId = l7._uploadId ?? null;

  const l8 = await level8(uploadId);
  display(l8); allResults.push(...l8.filter(r => r.ok !== null));
  if (l8.some(r => r.ok === false)) { finish('FAIL (level 8)', allResults); return; }
  const commitDone = l8.some(r => r.name === 'commit:post' && r.ok === true);

  const l9 = await level9(commitDone ? uploadId : null);
  display(l9); allResults.push(...l9.filter(r => r.ok !== null));
  if (l9.some(r => r.ok === false)) { finish('FAIL (level 9)', allResults); return; }

  const l10 = await level10();
  display(l10); allResults.push(...l10);
  // Level 10 is diagnostic-only — never gates the final verdict.

  finish('PASS ✓', allResults);
}

function finish(status, results) {
  st.textContent = status;
  st.className   = status.startsWith('PASS') ? 'ok' : 'fail';
  fetch(url('/_test/results'), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer dev-test' },
    body: JSON.stringify({ ts: new Date().toISOString(), ua: navigator.userAgent, status, results })
  }).catch(e => log('fail', 'POST failed: ' + e.message));
}

run().catch(e => { st.textContent = 'ERROR'; log('fail', String(e)); });

// Reload on server signal (file save during dev).
const es = new EventSource(url('/_test/events'));
es.addEventListener('reload', () => location.reload());
</script>
</body>
</html>
