<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App test</title>
<style>
* { box-sizing: border-box; }
body  { font-family: monospace; padding: 1rem; background: #111; color: #eee; font-size: 13px; line-height: 1.5; }
h1    { font-size: 1rem; margin: 0 0 .5rem; }
.ok   { color: #4f4; }
.fail { color: #f66; }
.skip { color: #888; }
.info { color: #666; }
pre   { margin: 0; }
</style>
</head>
<body>
<h1>App — <span id="st">running…</span></h1>
<pre id="out"></pre>

<script type="module">
const out = document.getElementById('out');
const st  = document.getElementById('st');

// When served via a reverse proxy at e.g. /_dev/_test, all internal URLs
// must be prefixed with that base path and carry the auth token.
const _tok      = new URLSearchParams(location.search).get('token') ?? '';
const _adminTok = new URLSearchParams(location.search).get('admin_token') ?? '';
const _base     = location.pathname.replace(/\/_test.*$/, '');
function url(path) {
  const u = new URL(_base + path, location.origin);
  if (_tok) u.searchParams.set('token', _tok);
  return u.toString();
}
// Authorization header for admin API calls.
// Pass ?admin_token=<ADMIN_TOKEN> to enable authenticated test levels.
function authHdr() {
  return _adminTok ? { Authorization: `Bearer ${_adminTok}` } : {};
}

function log(cls, txt) {
  const s = document.createElement('span');
  s.className = cls; s.textContent = txt + '\n';
  out.appendChild(s);
}
function section(title) { log('info', `\n── ${title} ──`); }
function pass(name, detail = '') { return { name, ok: true,  detail }; }
function fail(name, e)           { return { name, ok: false, detail: `${e?.constructor?.name ?? 'Error'}: ${e?.message ?? e}` }; }

// Run an inline blob worker, return its postMessage result.
function runWorker(src) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(new Blob([src], { type: 'application/javascript' }));
    const w = new Worker(url);
    w.onmessage = e => { URL.revokeObjectURL(url); w.terminate(); resolve(e.data); };
    w.onerror   = e => { URL.revokeObjectURL(url); w.terminate(); reject(new Error(e.message ?? 'worker error')); };
    w.postMessage(null);
  });
}

// ── Level 1: raw OPFS APIs ──────────────────────────────────────────────────
async function level1() {
  section('Level 1 — raw OPFS');
  const results = [];

  // Main-thread storage handle
  try {
    const root = await navigator.storage.getDirectory();
    results.push(pass('main:getDirectory'));

    // createWritable (main thread — async writable stream)
    try {
      const fh = await root.getFileHandle('_l1_writable', { create: true });
      try {
        const w = await fh.createWritable();
        await w.write('writable-ok'); await w.close();
        const text = await (await fh.getFile()).text();
        results.push(pass('main:createWritable', text === 'writable-ok' ? text : `MISMATCH: ${text}`));
      } catch(e) { results.push(fail('main:createWritable', e)); }
      await root.removeEntry('_l1_writable').catch(() => {});
    } catch(e) { results.push(fail('main:getFileHandle', e)); }
  } catch(e) {
    results.push(fail('main:getDirectory', e));
  }

  // Worker-thread: createSyncAccessHandle
  try {
    const workerResults = await runWorker(`
self.onmessage = async () => {
  const res = [];
  try {
    const root = await navigator.storage.getDirectory();
    res.push({ name: 'worker:getDirectory', ok: true, detail: '' });
    try {
      const fh = await root.getFileHandle('_l1_sah', { create: true });
      try {
        const sah = await fh.createSyncAccessHandle();
        const enc = new TextEncoder().encode('sah-ok');
        sah.write(enc, { at: 0 }); sah.flush();
        const dec = new Uint8Array(enc.byteLength);
        sah.read(dec, { at: 0 }); sah.close();
        const got = new TextDecoder().decode(dec);
        res.push({ name: 'worker:createSyncAccessHandle', ok: got === 'sah-ok', detail: got });
      } catch(e) { res.push({ name: 'worker:createSyncAccessHandle', ok: false, detail: e.constructor.name+': '+e.message }); }
      await root.removeEntry('_l1_sah').catch(() => {});
    } catch(e) { res.push({ name: 'worker:getFileHandle', ok: false, detail: e.constructor.name+': '+e.message }); }
  } catch(e) { res.push({ name: 'worker:getDirectory', ok: false, detail: e.constructor.name+': '+e.message }); }
  self.postMessage(res);
};
    `);
    results.push(...workerResults);
  } catch(e) { results.push(fail('worker:init', e)); }

  return results;
}

// ── Level 2: app worker — atomic write/readback/remove ──────────────────────
async function level2() {
  section('Level 2 — app worker (opfs-worker.js)');

  const probe = await fetch(url('/static/admin/opfs-worker.js'), { method: 'HEAD' });
  if (!probe.ok) {
    log('skip', '⊘ bundle missing — run npm run build:admin');
    return [{ name: 'worker:load', ok: null }];
  }

  const results = [];
  const worker = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
  const call = msg => new Promise((resolve, reject) => {
    worker.onmessage = e => resolve(e.data);
    worker.onerror   = e => reject(new Error(e.message ?? 'worker error'));
    worker.postMessage(msg);
  });

  try {
    // Write
    const r1 = await call({ id: 'l2a', op: 'write', path: '_test/probe.txt', data: 'app-worker-ok' });
    results.push({ name: 'worker:write', ok: r1.ok, detail: r1.ok ? '' : (r1.debug ?? r1.error) });

    if (r1.ok) {
      // Readback via direct OPFS from main thread
      const root = await navigator.storage.getDirectory();
      const dir  = await root.getDirectoryHandle('_test', { create: false });
      const fh   = await dir.getFileHandle('probe.txt', { create: false });
      const text = await (await fh.getFile()).text();
      results.push({ name: 'worker:readback', ok: text === 'app-worker-ok', detail: text });

      // Remove
      const r2 = await call({ id: 'l2b', op: 'remove', path: '_test/probe.txt' });
      results.push({ name: 'worker:remove', ok: r2.ok, detail: r2.ok ? '' : r2.error });
      await root.removeEntry('_test', { recursive: true }).catch(() => {});
    }
  } catch(e) {
    results.push(fail('worker:op', e));
  } finally {
    worker.terminate();
  }
  return results;
}

// ── Level 3: persistence across worker restart ───────────────────────────────
// Write via one worker instance, terminate it, spin up a fresh one,
// read back. Verifies data survives beyond the originating worker's lifetime.
async function level3() {
  section('Level 3 — persistence across worker restart');
  const results = [];

  const w1 = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
  const call1 = msg => new Promise((resolve, reject) => {
    w1.onmessage = e => resolve(e.data);
    w1.onerror   = e => reject(new Error(e.message));
    w1.postMessage(msg);
  });

  try {
    const r1 = await call1({ id: 'l3a', op: 'write', path: '_test/persist.txt', data: 'persist-ok' });
    results.push({ name: 'persist:write', ok: r1.ok, detail: r1.ok ? '' : (r1.debug ?? r1.error) });
    w1.terminate();

    if (!r1.ok) return results;

    // Fresh worker instance — no shared state with w1
    const w2 = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
    const call2 = msg => new Promise((resolve, reject) => {
      w2.onmessage = e => resolve(e.data);
      w2.onerror   = e => reject(new Error(e.message));
      w2.postMessage(msg);
    });

    try {
      // Read back via main-thread OPFS (worker only writes; reads stay main-thread)
      const root = await navigator.storage.getDirectory();
      const dir  = await root.getDirectoryHandle('_test', { create: false });
      const fh   = await dir.getFileHandle('persist.txt', { create: false });
      const text = await (await fh.getFile()).text();
      results.push({ name: 'persist:readback-after-restart', ok: text === 'persist-ok', detail: text });

      // Overwrite with w2
      const r2 = await call2({ id: 'l3b', op: 'write', path: '_test/persist.txt', data: 'overwrite-ok' });
      results.push({ name: 'persist:overwrite', ok: r2.ok, detail: r2.ok ? '' : (r2.debug ?? r2.error) });

      if (r2.ok) {
        // Re-read the file handle since content changed
        const fh2   = await dir.getFileHandle('persist.txt', { create: false });
        const text3 = await (await fh2.getFile()).text();
        results.push({ name: 'persist:readback-overwrite', ok: text3 === 'overwrite-ok', detail: text3 });
      }

      // Cleanup
      const r3 = await call2({ id: 'l3c', op: 'remove', path: '_test/persist.txt' });
      results.push({ name: 'persist:cleanup', ok: r3.ok, detail: r3.ok ? '' : r3.error });
      await root.removeEntry('_test', { recursive: true }).catch(() => {});
    } finally {
      w2.terminate();
    }
  } catch(e) {
    w1.terminate();
    results.push(fail('persist:op', e));
  }
  return results;
}

// ── Level 4: nested directory paths ─────────────────────────────────────────
// The app worker's walk() traverses multi-segment paths. Exercise it with
// two levels of nesting and verify correct file resolution.
async function level4() {
  section('Level 4 — nested directory paths');
  const results = [];

  const worker = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
  const call = msg => new Promise((resolve, reject) => {
    worker.onmessage = e => resolve(e.data);
    worker.onerror   = e => reject(new Error(e.message));
    worker.postMessage(msg);
  });

  const paths = [
    '_test/a.txt',
    '_test/sub/b.txt',
    '_test/sub/deep/c.txt'
  ];

  try {
    // Write all
    for (const [i, p] of paths.entries()) {
      const r = await call({ id: `l4w${i}`, op: 'write', path: p, data: `content:${p}` });
      results.push({ name: `nested:write:${p}`, ok: r.ok, detail: r.ok ? '' : (r.debug ?? r.error) });
    }

    // Read back each via main-thread OPFS traversal
    const root = await navigator.storage.getDirectory();
    for (const p of paths) {
      try {
        const parts = p.split('/');
        let dir = root;
        for (const seg of parts.slice(0, -1)) dir = await dir.getDirectoryHandle(seg);
        const fh   = await dir.getFileHandle(parts.at(-1));
        const text = await (await fh.getFile()).text();
        results.push({ name: `nested:readback:${p}`, ok: text === `content:${p}`, detail: text });
      } catch(e) {
        results.push(fail(`nested:readback:${p}`, e));
      }
    }

    // Remove root, verify it's gone
    await root.removeEntry('_test', { recursive: true }).catch(() => {});
    let gone = false;
    try { await root.getDirectoryHandle('_test'); } catch { gone = true; }
    results.push({ name: 'nested:cleanup', ok: gone, detail: gone ? '' : '_test dir still present' });
  } catch(e) {
    results.push(fail('nested:op', e));
  } finally {
    worker.terminate();
  }
  return results;
}

// ── Level 5: large payload ───────────────────────────────────────────────────
// Write 1 MiB, read back and verify byte count + spot-check content.
async function level5() {
  section('Level 5 — large payload (1 MiB)');
  const results = [];

  const worker = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
  const call = msg => new Promise((resolve, reject) => {
    worker.onmessage = e => resolve(e.data);
    worker.onerror   = e => reject(new Error(e.message));
    worker.postMessage(msg);
  });

  // 1 MiB of repeating ASCII — deterministic, easy to spot-check
  const PAYLOAD = 'x'.repeat(1024 * 1024);

  try {
    const t0 = performance.now();
    const r = await call({ id: 'l5a', op: 'write', path: '_test/large.txt', data: PAYLOAD });
    const writeMs = Math.round(performance.now() - t0);
    results.push({ name: 'large:write', ok: r.ok, detail: r.ok ? `${writeMs}ms` : (r.debug ?? r.error) });

    if (r.ok) {
      const root = await navigator.storage.getDirectory();
      const dir  = await root.getDirectoryHandle('_test', { create: false });
      const fh   = await dir.getFileHandle('large.txt', { create: false });
      const file = await fh.getFile();
      const t1 = performance.now();
      const text = await file.text();
      const readMs = Math.round(performance.now() - t1);
      const sizeOk = text.length === PAYLOAD.length;
      const contentOk = text === PAYLOAD;
      results.push({
        name: 'large:readback',
        ok: sizeOk && contentOk,
        detail: `${text.length} bytes, ${readMs}ms${contentOk ? '' : ' CONTENT MISMATCH'}`
      });
      await root.removeEntry('_test', { recursive: true }).catch(() => {});
    }
  } catch(e) {
    results.push(fail('large:op', e));
  } finally {
    worker.terminate();
  }
  return results;
}

// ── Level 6: atomic swap — simulate concurrent write ────────────────────────
// Fire two write ops to the same path from the same worker in quick
// succession. Both should succeed (the second wins); no corruption.
async function level6() {
  section('Level 6 — rapid sequential writes (last-write-wins)');
  const results = [];

  const worker = new Worker(url('/static/admin/opfs-worker.js'), { type: 'module' });
  // Dispatch both messages before either resolves so they queue inside the worker.
  const responses = {};
  worker.onmessage = e => { responses[e.data.id] = e.data; };

  worker.postMessage({ id: 'l6a', op: 'write', path: '_test/race.txt', data: 'first' });
  worker.postMessage({ id: 'l6b', op: 'write', path: '_test/race.txt', data: 'second' });

  try {
    const [r1, r2] = await Promise.all([
      new Promise(res => { const iv = setInterval(() => { if (responses.l6a) { clearInterval(iv); res(responses.l6a); } }, 10); }),
      new Promise(res => { const iv = setInterval(() => { if (responses.l6b) { clearInterval(iv); res(responses.l6b); } }, 10); })
    ]);
    results.push({ name: 'race:both-completed', ok: r1.ok && r2.ok,
      detail: `r1=${r1.ok} r2=${r2.ok}${r1.ok ? '' : ' '+r1.error}${r2.ok ? '' : ' '+r2.error}` });

    if (r1.ok && r2.ok) {
      const root = await navigator.storage.getDirectory();
      const dir  = await root.getDirectoryHandle('_test', { create: false });
      const fh   = await dir.getFileHandle('race.txt', { create: false });
      const text = await (await fh.getFile()).text();
      // Either 'first' or 'second' is valid — worker serialises internally
      const valid = text === 'first' || text === 'second';
      results.push({ name: 'race:no-corruption', ok: valid, detail: `winner: "${text}"` });
      await root.removeEntry('_test', { recursive: true }).catch(() => {});
    }
  } catch(e) {
    results.push(fail('race:op', e));
  } finally {
    worker.terminate();
  }
  return results;
}

// ── Level 7: admin API — image upload ───────────────────────────────────────
// Uploads a tiny canvas-generated JPEG. Requires ?admin_token=<ADMIN_TOKEN>.
// Returns the image id for use by levels 8–9.
async function level7() {
  section('Level 7 — admin API: image upload');
  if (!_adminTok) {
    log('skip', '⊘ skipped — pass ?admin_token=<ADMIN_TOKEN> to enable');
    return [{ name: 'upload:auth', ok: null }];
  }
  const results = [];
  try {
    // Tiny 10×10 JPEG via canvas
    const c = document.createElement('canvas');
    c.width = 10; c.height = 10;
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'rgb(200,50,50)'; ctx.fillRect(0, 0, 10, 10);
    const blob = await new Promise((res, rej) =>
      c.toBlob(b => b ? res(b) : rej(new Error('toBlob empty')), 'image/jpeg', 0.8)
    );
    const fd = new FormData();
    fd.append('file', blob, 'test.jpg');
    const res = await fetch(url('/admin/upload'), {
      method: 'POST', body: fd, headers: authHdr()
    });
    const body = await res.text();
    if (!res.ok) {
      results.push(fail('upload:post', new Error(`${res.status} ${body}`)));
      return results;
    }
    const json = JSON.parse(body);
    results.push({ name: 'upload:post', ok: true, detail: `id=${json.id?.slice(0,12)}…` });
    results.push({ name: 'upload:id', ok: typeof json.id === 'string' && json.id.length === 64,
      detail: json.id?.length ? `len=${json.id.length}` : 'missing' });
    results._uploadId = json.id; // pass to level 8
  } catch(e) { results.push(fail('upload:op', e)); }
  return results;
}

// ── Level 8: admin API — crop commit ────────────────────────────────────────
// Commits a crop op + WebP bake against the image uploaded in level 7.
// This replicates the exact flow the editor uses, including canvas→WebP encode.
async function level8(imageId) {
  section('Level 8 — admin API: crop commit');
  if (!_adminTok || !imageId) {
    log('skip', !_adminTok ? '⊘ skipped — no admin_token' : '⊘ skipped — level 7 failed');
    return [{ name: 'commit:skip', ok: null }];
  }
  const results = [];
  try {
    // Bake: 8×8 WebP (crop {x:1,y:1,w:8,h:8} of the 10×10 original)
    const c = document.createElement('canvas');
    c.width = 8; c.height = 8;
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'rgb(100,150,200)'; ctx.fillRect(0, 0, 8, 8);
    let bakeBlob = await new Promise((res, rej) =>
      c.toBlob(b => b ? res(b) : rej(new Error('toBlob empty')), 'image/webp', 0.95)
    );

    // Log what format canvas produced; fall back to JPEG on iOS (mirrors production).
    // WebP is preferred; iOS Safari/Chrome fall back to JPEG which the server accepts.
    if (bakeBlob.type !== 'image/webp') {
      bakeBlob = await new Promise((res, rej) =>
        c.toBlob(b => b ? res(b) : rej(new Error('toBlob empty')), 'image/jpeg', 0.95)
      );
    }
    results.push({ name: 'commit:bake-format', ok: true, detail: `type=${bakeBlob.type}` });

    const ops = [{ type: 'crop', x: 1, y: 1, w: 8, h: 8 }];
    const fd = new FormData();
    fd.append('ops', JSON.stringify({ ops, redoStack: [] }));
    fd.append('bake', bakeBlob, `${imageId}.webp`);
    const res = await fetch(url(`/admin/sidecar/${imageId}/commit`), {
      method: 'POST', body: fd, headers: authHdr()
    });
    const body = await res.text();
    if (!res.ok) {
      results.push(fail('commit:post', new Error(`${res.status} ${body}`)));
      return results;
    }
    const json = JSON.parse(body);
    const op = json.ops?.[0];
    results.push({ name: 'commit:post', ok: res.ok, detail: `status=${res.status}` });
    results.push({ name: 'commit:ops-roundtrip', ok: op?.type === 'crop' && op?.x === 1 && op?.y === 1 && op?.w === 8 && op?.h === 8,
      detail: JSON.stringify(op) });
  } catch(e) { results.push(fail('commit:op', e)); }
  return results;
}

// ── Level 9: admin API — sidecar meta read-back ──────────────────────────────
// Reads back the sidecar after the crop commit and verifies ops are persisted.
async function level9(imageId) {
  section('Level 9 — admin API: sidecar meta read-back');
  if (!_adminTok || !imageId) {
    log('skip', !_adminTok ? '⊘ skipped — no admin_token' : '⊘ skipped — level 7/8 failed or WebP not supported');
    return [{ name: 'meta:skip', ok: null }];
  }
  const results = [];
  try {
    const res = await fetch(url(`/admin/sidecar/${imageId}/meta`), { headers: authHdr() });
    const body = await res.text();
    if (!res.ok) {
      results.push(fail('meta:get', new Error(`${res.status} ${body}`)));
      return results;
    }
    const json = JSON.parse(body);
    results.push({ name: 'meta:get', ok: true, detail: `${json.width}×${json.height} ${json.format}` });
    const op = json.ops?.[0];
    results.push({ name: 'meta:ops-persisted', ok: op?.type === 'crop' && op?.x === 1 && op?.y === 1 && op?.w === 8 && op?.h === 8,
      detail: JSON.stringify(op) });
    results.push({ name: 'meta:dims', ok: json.width === 10 && json.height === 10,
      detail: `${json.width}×${json.height}` });
  } catch(e) { results.push(fail('meta:op', e)); }
  return results;
}

// ── Level 10: canvas capability matrix ──────────────────────────────────────
// Probes browser canvas features the editor relies on. All results are
// informational (ok: true always) — they surface platform differences
// without gating the overall pass/fail. Safari/iOS specifics:
//   • canvas.toBlob('image/webp') → silently produces JPEG on iOS WebKit
//   • WebGL → available but limited to WebGL1 on older iOS; context can
//     be lost if too many contexts exist across tabs
//   • createImageBitmap → available iOS 15+; used by ingest-resize-client
async function level10() {
  section('Level 10 — canvas capability matrix');
  const results = [];

  // canvas.toBlob format matrix: what does this browser actually produce?
  const c = document.createElement('canvas');
  c.width = 4; c.height = 4;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3af'; ctx.fillRect(0, 0, 4, 4);
  for (const mime of ['image/webp', 'image/jpeg', 'image/png']) {
    try {
      const blob = await new Promise((res, rej) =>
        c.toBlob(b => b ? res(b) : rej(new Error('null blob')), mime, 0.9)
      );
      results.push({ name: `toBlob:${mime.split('/')[1]}`, ok: true,
        detail: `type=${blob.type} size=${blob.size}B` });
    } catch(e) { results.push(fail(`toBlob:${mime.split('/')[1]}`, e)); }
  }

  // WebGL probe: availability + renderer string (useful for diagnosing
  // perspective-transform failures; iOS limits max-texture-size).
  try {
    const gl = document.createElement('canvas').getContext('webgl');
    if (!gl) {
      results.push({ name: 'webgl:context', ok: true, detail: 'unavailable' });
    } else {
      const dbgInfo = gl.getExtension('WEBGL_debug_renderer_info');
      const renderer = dbgInfo
        ? gl.getParameter(dbgInfo.UNMASKED_RENDERER_WEBGL)
        : gl.getParameter(gl.RENDERER);
      const maxTex = gl.getParameter(gl.MAX_TEXTURE_SIZE);
      results.push({ name: 'webgl:context', ok: true, detail: `available` });
      results.push({ name: 'webgl:renderer', ok: true, detail: String(renderer) });
      results.push({ name: 'webgl:max-texture', ok: true, detail: `${maxTex}px` });
      // Lose the context immediately so we don't hit the browser's limit.
      const ext = gl.getExtension('WEBGL_lose_context');
      if (ext) ext.loseContext();
    }
  } catch(e) { results.push(fail('webgl:context', e)); }

  // createImageBitmap: used by ingest-resize-client for client-side resize.
  // iOS 15+ supports it; older iOS does not, causing silent fallback to raw upload.
  try {
    if (typeof createImageBitmap === 'undefined') {
      results.push({ name: 'createImageBitmap', ok: true, detail: 'unavailable' });
    } else {
      const src = document.createElement('canvas');
      src.width = 8; src.height = 8;
      src.getContext('2d').fillRect(0, 0, 8, 8);
      const blob = await new Promise((res, rej) =>
        src.toBlob(b => b ? res(b) : rej(new Error('null')), 'image/png')
      );
      const bmp = await createImageBitmap(blob);
      results.push({ name: 'createImageBitmap', ok: true,
        detail: `${bmp.width}×${bmp.height}` });
      bmp.close();
    }
  } catch(e) { results.push(fail('createImageBitmap', e)); }

  // OffscreenCanvas: used by ingest-resize-client for off-main-thread rendering.
  results.push({ name: 'OffscreenCanvas', ok: true,
    detail: typeof OffscreenCanvas !== 'undefined' ? 'available' : 'unavailable' });

  return results;
}

// ── Level 11: client-side ingest pipeline ────────────────────────────────────
// Exercises the full OffscreenCanvas + createImageBitmap + convertToBlob path
// that ingest-resize-client.ts uses. Level 10 probes availability; this level
// runs the actual pipeline so failures surface on real devices.
async function level11() {
  section('Level 11 — client-side ingest pipeline');
  const results = [];

  if (typeof OffscreenCanvas === 'undefined' || typeof createImageBitmap === 'undefined') {
    results.push({ name: 'ingest:pipeline', ok: null, detail: 'OffscreenCanvas/createImageBitmap unavailable — skipped' });
    return results;
  }

  // Build a small source image as a PNG blob using a regular canvas.
  try {
    const src = document.createElement('canvas');
    src.width = 64; src.height = 64;
    const ctx2d = src.getContext('2d');
    ctx2d.fillStyle = '#1a7fff'; ctx2d.fillRect(0, 0, 64, 64);
    const pngBlob = await new Promise((res, rej) =>
      src.toBlob(b => b ? res(b) : rej(new Error('null blob')), 'image/png')
    );
    results.push(pass('ingest:source-blob', `PNG ${pngBlob.size}B`));

    // Decode via createImageBitmap (with imageOrientation option used in production).
    let bitmap;
    try {
      bitmap = await createImageBitmap(pngBlob, { imageOrientation: 'from-image' });
    } catch {
      bitmap = await createImageBitmap(pngBlob);
      results.push(pass('ingest:imageOrientation-option', 'unsupported — fell back to basic decode'));
    }
    results.push(pass('ingest:createImageBitmap', `${bitmap.width}×${bitmap.height}`));

    // Draw onto an OffscreenCanvas (the resize step).
    const osc = new OffscreenCanvas(bitmap.width, bitmap.height);
    const oscCtx = osc.getContext('2d');
    if (!oscCtx) throw new Error('OffscreenCanvas 2d context unavailable');
    oscCtx.drawImage(bitmap, 0, 0);
    bitmap.close();
    results.push(pass('ingest:OffscreenCanvas-draw', `${osc.width}×${osc.height}`));

    // Encode to WebP (the re-encode step).
    let blob;
    try {
      blob = await osc.convertToBlob({ type: 'image/webp', quality: 0.82 });
    } catch {
      blob = null;
    }
    if (!blob) {
      results.push({ name: 'ingest:encode-webp', ok: false, detail: 'convertToBlob returned null' });
    } else if (blob.type === 'image/webp') {
      results.push(pass('ingest:encode-webp', `${blob.type} ${blob.size}B`));
    } else if (blob.type === 'image/png') {
      // iOS WebKit silently produces PNG when asked for WebP. The app now
      // detects this and uses the correct ext/mimeType for the upload.
      results.push(pass('ingest:encode-webp', `WebP unavailable — got PNG (iOS fallback, handled)`));
    } else {
      results.push({ name: 'ingest:encode-webp', ok: false,
        detail: `unexpected type=${blob.type}` });
    }
  } catch(e) { results.push(fail('ingest:pipeline', e)); }

  return results;
}

// ── Level 12: WebGL perspective pipeline ─────────────────────────────────────
// Draws a solid-colour quad via WebGL and reads pixels back with readPixels.
// Validates that canvas.ts applyPerspective would actually produce output.
async function level12() {
  section('Level 12 — WebGL rendering pipeline');
  const results = [];

  try {
    const cv = document.createElement('canvas');
    cv.width = 8; cv.height = 8;
    const gl = cv.getContext('webgl', { premultipliedAlpha: false });
    if (!gl) {
      results.push({ name: 'webgl:render-pipeline', ok: true, detail: 'WebGL unavailable — perspective op is disabled in app (expected)' });
      return results;
    }

    // Compile a minimal program: clear to a known colour, read it back.
    const vert = `attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;
    const frag = `precision mediump float;void main(){gl_FragColor=vec4(1.0,0.0,0.0,1.0);}`;

    function compile(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
      return s;
    }
    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, vert));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
    gl.useProgram(prog);

    // Full-screen quad (two triangles covering clip space).
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const aLoc = gl.getAttribLocation(prog, 'a');
    gl.enableVertexAttribArray(aLoc);
    gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

    gl.viewport(0, 0, 8, 8);
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    const pixels = new Uint8Array(4);
    gl.readPixels(4, 4, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
    const [r, g, b, a] = pixels;

    if (r === 255 && g === 0 && b === 0 && a === 255) {
      results.push(pass('webgl:render-pipeline', `readPixels=[${r},${g},${b},${a}] ✓`));
    } else {
      results.push({ name: 'webgl:render-pipeline', ok: false,
        detail: `readPixels=[${r},${g},${b},${a}] expected [255,0,0,255]` });
    }

    const ext = gl.getExtension('WEBGL_lose_context');
    if (ext) ext.loseContext();
  } catch(e) { results.push(fail('webgl:render-pipeline', e)); }

  return results;
}

// ── Level 13: BroadcastChannel ───────────────────────────────────────────────
// Used by online-state.ts and sync.ts for cross-tab coordination.
async function level13() {
  section('Level 13 — BroadcastChannel');
  const results = [];

  if (typeof BroadcastChannel === 'undefined') {
    results.push({ name: 'BroadcastChannel', ok: true, detail: 'unavailable — cross-tab sync disabled (expected on some browsers)' });
    return results;
  }

  try {
    const received = await new Promise((resolve, reject) => {
      const ch1 = new BroadcastChannel('rkr-test-bc');
      const ch2 = new BroadcastChannel('rkr-test-bc');
      const tid = setTimeout(() => { ch1.close(); ch2.close(); reject(new Error('timeout — message never arrived')); }, 2000);
      ch2.onmessage = e => {
        clearTimeout(tid);
        ch1.close(); ch2.close();
        resolve(e.data);
      };
      ch1.postMessage({ ping: 42 });
    });
    if (received?.ping === 42) {
      results.push(pass('BroadcastChannel:send-receive', 'round-trip ok'));
    } else {
      results.push({ name: 'BroadcastChannel:send-receive', ok: false,
        detail: `unexpected data: ${JSON.stringify(received)}` });
    }
  } catch(e) { results.push(fail('BroadcastChannel:send-receive', e)); }

  return results;
}

// ── Level 14: navigator.locks ────────────────────────────────────────────────
// Used by opfs-schema.ts and sync.ts for mutual exclusion.
async function level14() {
  section('Level 14 — navigator.locks');
  const results = [];

  if (typeof navigator === 'undefined' || !navigator.locks) {
    results.push({ name: 'navigator.locks', ok: false,
      detail: 'unavailable — OPFS mutual exclusion and outbox drain will not work' });
    return results;
  }
  results.push(pass('navigator.locks', 'available'));

  try {
    const val = await navigator.locks.request('rkr-test-lock', async () => 'acquired');
    if (val === 'acquired') {
      results.push(pass('navigator.locks:request', 'lock acquired and released'));
    } else {
      results.push({ name: 'navigator.locks:request', ok: false,
        detail: `unexpected return: ${val}` });
    }
  } catch(e) { results.push(fail('navigator.locks:request', e)); }

  // Verify a second lock request on the same name resolves after first releases.
  try {
    let order = '';
    await Promise.all([
      navigator.locks.request('rkr-test-lock-b', async () => { order += 'A'; }),
      navigator.locks.request('rkr-test-lock-b', async () => { order += 'B'; }),
    ]);
    results.push(pass('navigator.locks:exclusion', `sequential order confirmed`));
  } catch(e) { results.push(fail('navigator.locks:exclusion', e)); }

  return results;
}

// ── Level 15: platform APIs matrix (diagnostic) ──────────────────────────────
// navigator.storage.estimate, serviceWorker, onLine, clipboard.
// Informational only — never gates the final verdict.
async function level15() {
  section('Level 15 — platform APIs matrix');
  const results = [];

  // navigator.storage.estimate — used by storage-panel.ts to show quota/usage.
  try {
    if (!navigator.storage?.estimate) {
      results.push({ name: 'storage:estimate', ok: true, detail: 'unavailable' });
    } else {
      const est = await navigator.storage.estimate();
      const used = est.usage != null ? `${(est.usage / 1024).toFixed(1)}KB` : 'unknown';
      const quota = est.quota != null ? `${(est.quota / 1024 / 1024).toFixed(1)}MB` : 'unknown';
      results.push(pass('storage:estimate', `used=${used} quota=${quota}`));
    }
  } catch(e) { results.push(fail('storage:estimate', e)); }

  // navigator.serviceWorker — used by save.ts to flush cached pages on publish.
  results.push(pass('serviceWorker',
    'serviceWorker' in navigator ? `available controller=${navigator.serviceWorker.controller ? 'yes' : 'none'}` : 'unavailable'));

  // navigator.onLine — polled by online-state.ts; truth source is a HEAD probe.
  results.push(pass('navigator.onLine', String(navigator.onLine)));

  // Clipboard writeText — used by copy-link.ts.
  try {
    if (!navigator.clipboard?.writeText) {
      results.push({ name: 'clipboard:writeText', ok: true, detail: 'unavailable' });
    } else {
      // Don't actually write; just verify the method exists and the permission
      // API recognises the query (on browsers that support it).
      let permState = 'unknown';
      try {
        const p = await navigator.permissions.query({ name: 'clipboard-write' });
        permState = p.state;
      } catch { /* permissions API may not support clipboard-write query */ }
      results.push(pass('clipboard:writeText', `available perm=${permState}`));
    }
  } catch(e) { results.push(fail('clipboard:writeText', e)); }

  return results;
}

// ── Level 16: crypto.randomUUID + TextEncoder/TextDecoder ────────────────────
// crypto.randomUUID is used by opfs.ts (message correlation IDs) and draft.ts.
// TextEncoder/TextDecoder are used by opfs-worker.ts to encode/decode file data.
async function level16() {
  section('Level 16 — crypto + text codecs');
  const results = [];

  // crypto.randomUUID
  try {
    if (typeof crypto === 'undefined' || typeof crypto.randomUUID !== 'function') {
      results.push({ name: 'crypto.randomUUID', ok: false, detail: 'unavailable — OPFS messaging and draft IDs will break' });
    } else {
      const id = crypto.randomUUID();
      const uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
      if (uuidRe.test(id)) {
        results.push(pass('crypto.randomUUID', id));
      } else {
        results.push({ name: 'crypto.randomUUID', ok: false, detail: `bad format: ${id}` });
      }
    }
  } catch(e) { results.push(fail('crypto.randomUUID', e)); }

  // TextEncoder
  try {
    const enc = new TextEncoder();
    const bytes = enc.encode('hello');
    const expected = [104, 101, 108, 108, 111]; // UTF-8 for 'hello'
    const match = bytes.length === 5 && expected.every((b, i) => bytes[i] === b);
    if (match) {
      results.push(pass('TextEncoder', `${bytes.length} bytes ok`));
    } else {
      results.push({ name: 'TextEncoder', ok: false, detail: `got [${Array.from(bytes)}]` });
    }
  } catch(e) { results.push(fail('TextEncoder', e)); }

  // TextDecoder
  try {
    const dec = new TextDecoder();
    const decoded = dec.decode(new Uint8Array([104, 101, 108, 108, 111]));
    if (decoded === 'hello') {
      results.push(pass('TextDecoder', 'round-trip ok'));
    } else {
      results.push({ name: 'TextDecoder', ok: false, detail: `got "${decoded}"` });
    }
  } catch(e) { results.push(fail('TextDecoder', e)); }

  return results;
}

// ── Level 17: Blob URL + HTMLImageElement decode round-trip ──────────────────
// Tests URL.createObjectURL → new Image() load → drawImage → getImageData.
// This is the exact path canvas-loaders.ts uses in loadOriginal when it decodes
// the master image into an HTMLImageElement for the canvas pipeline.
async function level17() {
  section('Level 17 — Blob URL + HTMLImageElement decode');
  const results = [];

  try {
    // Create a source canvas with a known colour (pure red).
    const src = document.createElement('canvas');
    src.width = 8; src.height = 8;
    src.getContext('2d').fillStyle = '#ff0000';
    src.getContext('2d').fillRect(0, 0, 8, 8);

    // Export as PNG blob.
    const blob = await new Promise((res, rej) =>
      src.toBlob(b => b ? res(b) : rej(new Error('null blob')), 'image/png')
    );
    results.push(pass('blobURL:source-blob', `${blob.size}B`));

    // Wrap as object URL and load via HTMLImageElement.
    const blobUrl = URL.createObjectURL(blob);
    const img = await new Promise((res, rej) => {
      const el = new Image();
      el.onload = () => res(el);
      el.onerror = () => rej(new Error('Image decode failed'));
      el.src = blobUrl;
    });
    URL.revokeObjectURL(blobUrl);
    results.push(pass('blobURL:Image-load', `${img.naturalWidth}×${img.naturalHeight}`));

    // Draw onto a new canvas and read a pixel.
    const out = document.createElement('canvas');
    out.width = img.naturalWidth; out.height = img.naturalHeight;
    const ctx = out.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const px = ctx.getImageData(4, 4, 1, 1).data; // [r, g, b, a]

    if (px[0] === 255 && px[1] === 0 && px[2] === 0 && px[3] === 255) {
      results.push(pass('blobURL:getImageData', `pixel=[${px[0]},${px[1]},${px[2]},${px[3]}] ✓`));
    } else {
      results.push({ name: 'blobURL:getImageData', ok: false,
        detail: `pixel=[${px[0]},${px[1]},${px[2]},${px[3]}] expected [255,0,0,255]` });
    }
  } catch(e) { results.push(fail('blobURL:pipeline', e)); }

  return results;
}

// ── Level 18: canvas 2D transform correctness ────────────────────────────────
// Exercises the same transform patterns used by applyRotate, applyFlip, and
// applyCrop in canvas.ts. Pixel-level verification catches bugs in the 2D
// context transform stack on older Android WebViews and obscure environments.
async function level18() {
  section('Level 18 — canvas 2D transform correctness');
  const results = [];

  function makeTestCanvas(w, h, fillFn) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    fillFn(c.getContext('2d'), w, h);
    return c;
  }
  function px(canvas, x, y) {
    return Array.from(canvas.getContext('2d').getImageData(x, y, 1, 1).data);
  }
  function sameColor(a, b, label) {
    const ok = a[0] === b[0] && a[1] === b[1] && a[2] === b[2] && a[3] === b[3];
    return ok
      ? pass(label, `[${a}] ✓`)
      : { name: label, ok: false, detail: `got [${a}] expected [${b}]` };
  }

  // --- applyCrop equivalent ---
  // 10×10 canvas: left half red (x<5), right half blue.
  // Crop to x=5, y=0, w=5, h=10 → all pixels should be blue.
  try {
    const src = makeTestCanvas(10, 10, (ctx) => {
      ctx.fillStyle = '#f00'; ctx.fillRect(0, 0, 5, 10);
      ctx.fillStyle = '#00f'; ctx.fillRect(5, 0, 5, 10);
    });
    const out = document.createElement('canvas');
    out.width = 5; out.height = 10;
    const ctx = out.getContext('2d');
    ctx.drawImage(src, 5, 0, 5, 10, 0, 0, 5, 10); // same as applyCrop
    results.push(sameColor(px(out, 2, 5), [0, 0, 255, 255], 'transform:crop'));
  } catch(e) { results.push(fail('transform:crop', e)); }

  // --- applyRotate 90° equivalent ---
  // 4×2 canvas: left half red (x<2), right half blue.
  // After 90° CW rotate(π/2): out is 2×4.
  // src pixel center (ix-1.5, iy-0.5) → screen (1.5-iy, ix+0.5).
  //   iy=1 row → screen col x=0; iy=0 row → screen col x=1.
  //   out(0,0) = src(0,1) = red   (src bottom-left → out top-left)
  //   out(0,3) = src(3,1) = blue  (src bottom-right → out bottom-left)
  //   out(1,0) = src(0,0) = red   (src top-left → out top-right)
  try {
    const src = makeTestCanvas(4, 2, (ctx) => {
      ctx.fillStyle = '#f00'; ctx.fillRect(0, 0, 2, 2); // left half red
      ctx.fillStyle = '#00f'; ctx.fillRect(2, 0, 2, 2); // right half blue
    });
    const out = document.createElement('canvas');
    out.width = src.height; // 2
    out.height = src.width; // 4
    const ctx = out.getContext('2d');
    ctx.translate(out.width / 2, out.height / 2);
    ctx.rotate(Math.PI / 2); // 90° CW (same as applyRotate)
    ctx.drawImage(src, -src.width / 2, -src.height / 2);
    // src bottom-left (red) → out(0,0); src bottom-right (blue) → out(0,3)
    results.push(sameColor(px(out, 0, 0), [255, 0, 0, 255], 'transform:rotate-90-top-left'));
    results.push(sameColor(px(out, 0, 3), [0, 0, 255, 255], 'transform:rotate-90-bottom-left'));
    results.push(sameColor(px(out, 1, 0), [255, 0, 0, 255], 'transform:rotate-90-top-right'));
  } catch(e) { results.push(fail('transform:rotate-90', e)); }

  // --- applyFlip horizontal equivalent ---
  // 10×4 canvas: left half red (x<5), right half blue.
  // After flip horizontal: left half becomes blue, right half red.
  try {
    const src = makeTestCanvas(10, 4, (ctx) => {
      ctx.fillStyle = '#f00'; ctx.fillRect(0, 0, 5, 4);
      ctx.fillStyle = '#00f'; ctx.fillRect(5, 0, 5, 4);
    });
    const out = document.createElement('canvas');
    out.width = src.width; out.height = src.height;
    const ctx = out.getContext('2d');
    ctx.translate(src.width, 0);
    ctx.scale(-1, 1); // same as applyFlip horizontal
    ctx.drawImage(src, 0, 0);
    results.push(sameColor(px(out, 2, 2), [0, 0, 255, 255], 'transform:flip-h-left-now-blue'));
    results.push(sameColor(px(out, 7, 2), [255, 0, 0, 255], 'transform:flip-h-right-now-red'));
  } catch(e) { results.push(fail('transform:flip-h', e)); }

  // --- applyFlip vertical equivalent ---
  // 4×10 canvas: top half red (y<5), bottom half blue.
  // After flip vertical: top becomes blue, bottom becomes red.
  try {
    const src = makeTestCanvas(4, 10, (ctx) => {
      ctx.fillStyle = '#f00'; ctx.fillRect(0, 0, 4, 5);
      ctx.fillStyle = '#00f'; ctx.fillRect(0, 5, 4, 5);
    });
    const out = document.createElement('canvas');
    out.width = src.width; out.height = src.height;
    const ctx = out.getContext('2d');
    ctx.translate(0, src.height);
    ctx.scale(1, -1); // same as applyFlip vertical
    ctx.drawImage(src, 0, 0);
    results.push(sameColor(px(out, 2, 2), [0, 0, 255, 255], 'transform:flip-v-top-now-blue'));
    results.push(sameColor(px(out, 2, 7), [255, 0, 0, 255], 'transform:flip-v-bottom-now-red'));
  } catch(e) { results.push(fail('transform:flip-v', e)); }

  return results;
}

// ── Runner ───────────────────────────────────────────────────────────────────

function display(results) {
  for (const r of results) {
    if (r.ok === null) continue; // skipped level
    log(r.ok ? 'ok' : 'fail', `${r.ok ? '✓' : '✗'} ${r.name}${r.detail ? '  ' + r.detail : ''}`);
  }
}

async function run() {
  log('info', navigator.userAgent + '\n');
  const allResults = [];

  const l1 = await level1();
  display(l1); allResults.push(...l1);
  if (l1.some(r => !r.ok)) { finish('FAIL (level 1)', allResults); return; }

  const l2 = await level2();
  display(l2); allResults.push(...l2.filter(r => r.ok !== null));
  if (l2.some(r => r.ok === false)) { finish('FAIL (level 2)', allResults); return; }

  display(l3); allResults.push(...l3);
  if (l3.some(r => !r.ok)) { finish('FAIL (level 3)', allResults); return; }

function finish(status, results) {
  st.textContent = status;
  st.className   = status.startsWith('PASS') ? 'ok' : 'fail';
  fetch(url('/_test/results'), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer dev-test' },
    body: JSON.stringify({ ts: new Date().toISOString(), ua: navigator.userAgent, status, results })
  }).catch(e => log('fail', 'POST failed: ' + e.message));
}

run().catch(e => { st.textContent = 'ERROR'; log('fail', String(e)); });

// Reload on server signal (file save during dev).
const es = new EventSource(url('/_test/events'));
es.addEventListener('reload', () => location.reload());
</script>
