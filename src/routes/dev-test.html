<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OPFS test</title>
<style>
* { box-sizing: border-box; }
body  { font-family: monospace; padding: 1rem; background: #111; color: #eee; font-size: 13px; line-height: 1.5; }
h1    { font-size: 1rem; margin: 0 0 .5rem; }
h2    { font-size: .85rem; margin: 1rem 0 .25rem; color: #aaa; text-transform: uppercase; letter-spacing: .05em; }
.ok   { color: #4f4; }
.fail { color: #f66; }
.skip { color: #888; }
.info { color: #666; }
pre   { margin: 0; }
</style>
</head>
<body>
<h1>OPFS — <span id="st">running…</span></h1>
<pre id="out"></pre>

<script type="module">
const out = document.getElementById('out');
const st  = document.getElementById('st');

function log(cls, txt) {
  const s = document.createElement('span');
  s.className = cls; s.textContent = txt + '\n';
  out.appendChild(s);
}
function section(title) { log('info', '\n── ' + title + ' ──'); }

// ── Level 1: raw OPFS APIs ──────────────────────────────────────────────────
// Tests every layer independently: main-thread directory handle,
// main-thread writable stream, and worker sync-access handle.

const L1_WORKER = `
self.onmessage = async () => {
  const res = [];
  const pass = (n, d) => res.push({ name: n, ok: true,  detail: d ?? '' });
  const fail = (n, e) => res.push({ name: n, ok: false, detail: (e?.constructor?.name ?? 'Error') + ': ' + e?.message });
  try {
    const root = await navigator.storage.getDirectory();
    pass('getDirectory');
    try {
      const fh = await root.getFileHandle('_probe', { create: true });
      pass('getFileHandle');
      try {
        const sah = await fh.createSyncAccessHandle();
        const enc = new TextEncoder().encode('sah-ok');
        sah.write(enc, { at: 0 }); sah.flush();
        const dec = new Uint8Array(enc.byteLength);
        sah.read(dec, { at: 0 }); sah.close();
        pass('createSyncAccessHandle', new TextDecoder().decode(dec));
      } catch(e) { fail('createSyncAccessHandle', e); }
      await root.removeEntry('_probe').catch(() => {});
    } catch(e) { fail('getFileHandle', e); }
  } catch(e) { fail('getDirectory', e); }
  self.postMessage(res);
};
`;

async function level1() {
  section('Level 1 — raw OPFS');
  const results = [];

  // Main thread
  try {
    const root = await navigator.storage.getDirectory();
    results.push({ name: 'main:getDirectory', ok: true });
    try {
      const fh = await root.getFileHandle('_writable', { create: true });
      try {
        const w = await fh.createWritable();
        await w.write('x'); await w.close();
        results.push({ name: 'main:createWritable', ok: true });
      } catch(e) {
        results.push({ name: 'main:createWritable', ok: false,
          detail: e?.constructor?.name + ': ' + e?.message });
      }
      await root.removeEntry('_writable').catch(() => {});
    } catch(e) {
      results.push({ name: 'main:getFileHandle', ok: false,
        detail: e?.constructor?.name + ': ' + e?.message });
    }
  } catch(e) {
    results.push({ name: 'main:getDirectory', ok: false,
      detail: e?.constructor?.name + ': ' + e?.message });
  }

  // Worker
  const workerResults = await new Promise(resolve => {
    const url = URL.createObjectURL(new Blob([L1_WORKER], { type: 'application/javascript' }));
    const w = new Worker(url);
    w.onmessage = e => { URL.revokeObjectURL(url); resolve(e.data); };
    w.onerror   = e => { URL.revokeObjectURL(url);
      resolve([{ name: 'worker:init', ok: false, detail: e.message }]); };
    w.postMessage(null);
  });

  return [...results, ...workerResults];
}

// ── Level 2: app worker (opfs-worker.js) ────────────────────────────────────
// Exercises the real built worker: atomic write → verify → remove.
// Skipped (not failed) if the bundle is absent (dev server without a build).

async function level2() {
  section('Level 2 — app worker');

  // Check bundle exists first.
  const probe = await fetch('/static/admin/opfs-worker.js', { method: 'HEAD' });
  if (!probe.ok) {
    const r = { name: 'worker:load', ok: null, detail: 'bundle missing — run npm run build:admin' };
    log('skip', '⊘ ' + r.name + '  ' + r.detail);
    return [r]; // null ok = skip, not fail
  }

  const results = [];
  const worker = new Worker(new URL('/static/admin/opfs-worker.js', location.origin), { type: 'module' });
  const call = (msg) => new Promise((resolve, reject) => {
    worker.onmessage = e => resolve(e.data);
    worker.onerror   = e => reject(new Error(e.type + ': ' + (e.message || JSON.stringify({ filename: e.filename, lineno: e.lineno }))));
    worker.postMessage(msg);
  });

  try {
    const id1 = 'w1';
    const res1 = await call({ id: id1, op: 'write', path: '_test/probe.txt', data: 'app-worker-ok' });
    results.push({ name: 'worker:write', ok: res1.ok && res1.id === id1,
      detail: res1.ok ? '' : (res1.debug ?? res1.error) });

    if (res1.ok) {
      // Read back via OPFS to confirm data was written correctly.
      const root  = await navigator.storage.getDirectory();
      const dir   = await root.getDirectoryHandle('_test', { create: false });
      const fh    = await dir.getFileHandle('probe.txt', { create: false });
      const file  = await fh.getFile();
      const text  = await file.text();
      results.push({ name: 'worker:readback', ok: text === 'app-worker-ok', detail: text });

      // Clean up.
      const id2 = 'w2';
      const res2 = await call({ id: id2, op: 'remove', path: '_test/probe.txt' });
      results.push({ name: 'worker:remove', ok: res2.ok && res2.id === id2,
        detail: res2.ok ? '' : res2.error });
      await root.getDirectoryHandle('_test').then(d => root.removeEntry('_test', { recursive: true })).catch(() => {});
    }
  } catch(e) {
    results.push({ name: 'worker:op', ok: false, detail: e?.message });
  } finally {
    worker.terminate();
  }
  return results;
}

// ── Runner ───────────────────────────────────────────────────────────────────

async function run() {
  log('info', navigator.userAgent + '\n');

  const allResults = [];

  const l1 = await level1();
  for (const r of l1) {
    log(r.ok ? 'ok' : 'fail', (r.ok ? '✓ ' : '✗ ') + r.name + (r.detail ? '  ' + r.detail : ''));
    allResults.push(r);
  }

  const l1pass = l1.every(r => r.ok);
  if (!l1pass) {
    st.textContent = 'FAIL (level 1)';
    st.className = 'fail';
    post(allResults);
    return;
  }

  const l2 = await level2();
  for (const r of l2) {
    if (r.ok === null) continue; // already logged as skip above
    log(r.ok ? 'ok' : 'fail', (r.ok ? '✓ ' : '✗ ') + r.name + (r.detail ? '  ' + r.detail : ''));
    allResults.push(r);
  }

  const l2fail = l2.some(r => r.ok === false);
  const pass = !l2fail;
  st.textContent = pass ? 'PASS ✓' : 'FAIL (level 2)';
  st.className   = pass ? 'ok' : 'fail';
  post(allResults);
}

function post(results) {
  fetch('/_test/results', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer dev-test' },
    body: JSON.stringify({ ts: new Date().toISOString(), ua: navigator.userAgent, results })
  }).catch(e => log('fail', 'POST failed: ' + e.message));
}

run().catch(e => { st.textContent = 'ERROR'; log('fail', String(e)); });

// Reload on server signal (file save during dev).
const es = new EventSource('/_test/events');
es.addEventListener('reload', () => location.reload());
</script>
</body>
</html>
