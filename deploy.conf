#!/bin/bash
# deploy.conf — rkr-blog deployment to rkr-blog.rkroll.com
# Usage:
#   deploy.sh init   . john@rkroll.com   # first deploy: SSL cert + Apache + service
#   deploy.sh update . john@rkroll.com   # subsequent: code + restart only

export DEPLOY_TYPES="letsencrypt apache fastify_app"

export APP_NAME="rkr-blog"
export DOMAIN_NAME="rkr-blog.rkroll.com"
export REMOTE_HOST="rkroll.com"
export REMOTE_USER="john"

# --- Let's Encrypt ----------------------------------------------------------
export LETSENCRYPT_EMAIL="john@rkroll.com"

# --- Apache -----------------------------------------------------------------
# Custom vhost is written by deploy/hooks/apache.build.post.sh; these values
# are still referenced by the hook script via env vars.
export APACHE_MODE="proxy"
export APACHE_PROXY_RULES="/:${FASTIFY_APP_PORT:-3000}:/"
export APACHE_SECURITY_HEADERS="no"   # hook writes its own headers block
export APACHE_CACHE_STATIC="no"       # hook writes immutable headers for /cache/ + /static/

# --- Fastify app ------------------------------------------------------------
export FASTIFY_APP_PORT="3000"
export FASTIFY_APP_USER="www-data"
export FASTIFY_APP_GROUP="www-data"
export FASTIFY_APP_BASE_PATH="/opt"          # app lands at /opt/rkr-blog
export FASTIFY_APP_DATA_PATH="/var/www"      # creates /var/www/rkr-blog (app user home)
export FASTIFY_APP_MAIN_SCRIPT="bin/server.js"
export FASTIFY_APP_NODE_OPTIONS="--no-warnings=ExperimentalWarning --experimental-strip-types"
export FASTIFY_APP_RESTART_POLICY="on-failure"
export FASTIFY_APP_RESTART_SEC="2"

# SITE_ROOT and secrets (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, ADMIN_TOKEN,
# PUBLIC_BASE_URL) are loaded at runtime from /etc/rkr-blog.env on the server.
# Copy secrets.env.example → secrets.env, fill it in, and deploy once —
# the file is synced to /etc/rkr-blog.env by the fastify_app module.
