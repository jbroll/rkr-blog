# rkr-blog vhost. See docs/spec.md §14.
#
# Required Apache modules: rewrite, proxy, proxy_http, headers, expires.
#   a2enmod rewrite proxy proxy_http headers expires
#
# DocumentRoot points at SITE_ROOT so /cache/ and /static/ resolve to
# files on disk; everything else is reverse-proxied to Fastify.

<VirtualHost *:443>
    ServerName  example.com
    DocumentRoot /var/www/site

    # TLS (terminate here; Fastify is plain HTTP on loopback).
    # SSLEngine on
    # SSLCertificateFile      /etc/letsencrypt/live/example.com/fullchain.pem
    # SSLCertificateKeyFile   /etc/letsencrypt/live/example.com/privkey.pem

    RewriteEngine On

    # Cache hit fast path: if the derivative file exists, Apache serves it
    # directly and Node never sees the request.
    RewriteCond %{DOCUMENT_ROOT}/cache%{REQUEST_URI} -f
    RewriteRule ^/img/(.*)$ /cache/img/$1 [L]

    # Everything else → Fastify on the loopback interface.
    # Strip any client-supplied X-Forwarded-For before forwarding so
    # login-throttle.ts per-IP tallies cannot be spoofed. Requires
    # mod_headers (already listed above). Fastify's trustProxy:'loopback'
    # is not sufficient alone — it trusts the hop but not the strip.
    RequestHeader unset X-Forwarded-For
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3000/ enablereuse=on
    ProxyPassReverse / http://127.0.0.1:3000/

    # Cache filenames are content-hashed, so `immutable` is honest.
    <LocationMatch "^/(cache|static)/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>
</VirtualHost>
