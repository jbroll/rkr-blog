# One-shot administrative workflow: create the persistent Fly volume
# `rkr_data` that fly.toml's [[mounts]] block needs at deploy time.
#
# Why this exists:
#   - Fly's GitHub App handles deploys, but doesn't create volumes.
#   - `[[mounts]] initial_size = "..."` only auto-creates on scale-out
#     (a second machine getting a new volume), not on the first deploy.
#   - Without terminal access we can't run `fly volumes create` locally.
#
# Two ways to trigger this:
#   (a) Mobile-friendly: push a commit to main that touches either this
#       workflow file or .github/triggers/fly-volume. The workflow runs
#       once on that commit, no UI clicks required.
#   (b) Desktop-friendly: GitHub Actions tab → workflow_dispatch with
#       customizable inputs (defaults to the right values).
#
# Setup once before either trigger:
#   1. Fly dashboard → Tokens → "Create deploy token" (deploy tokens
#      have volume:write scope on the app they're issued for); copy.
#   2. GitHub repo → Settings → Secrets and variables → Actions →
#      New repository secret. Name = FLY_API_TOKEN, value = paste.
#
# After the workflow exits successfully, the volume exists. Re-trigger
# the Fly GitHub App deploy (push any commit, or "Redeploy" from the
# dashboard) and it'll mount /site cleanly.
#
# Idempotent: re-running this workflow when the volume already exists
# logs a message and exits 0. Safe to re-run; safe that routine main
# pushes don't trigger it (path filter excludes everything outside
# this workflow + the trigger file).

name: Create Fly volume (one-shot)

on:
  workflow_dispatch:
    inputs:
      volume_name:
        description: 'Volume name (must match fly.toml [[mounts]].source)'
        required: true
        default: 'rkr_data'
      size_gb:
        description: 'Volume size in GB'
        required: true
        default: '1'
      region:
        description: 'Fly region (must match primary_region in fly.toml)'
        required: true
        default: 'ord'
  push:
    branches: [main]
    paths:
      # Editing this workflow re-runs it (so the first deploy of the
      # workflow itself triggers a run — no second commit needed).
      - '.github/workflows/fly-volume.yml'
      # An out-of-band trigger file. Touch it (any change) to force
      # a new run without modifying the workflow.
      - '.github/triggers/fly-volume'

jobs:
  create-volume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create volume (idempotent)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          # Inputs are only present on workflow_dispatch; fall back to
          # the same defaults so a tag-push run gets the right values.
          NAME: ${{ inputs.volume_name || 'rkr_data' }}
          SIZE: ${{ inputs.size_gb || '1' }}
          REGION: ${{ inputs.region || 'ord' }}
        run: |
          set -euo pipefail
          app=rkr-blog
          echo "Trigger: ${{ github.event_name }} ; ref: ${{ github.ref }}"
          echo "Volume='$NAME' Size='$SIZE'GB Region='$REGION' App='$app'"

          # If a volume with this name already exists, exit 0 — re-running
          # the workflow shouldn't double-allocate.
          if flyctl volumes list --app "$app" --json \
            | jq -e --arg n "$NAME" '.[] | select(.Name == $n)' >/dev/null; then
            echo "Volume '$NAME' already exists on $app; nothing to do."
            flyctl volumes list --app "$app"
            exit 0
          fi

          echo "Creating volume '$NAME' ${SIZE}GB in $REGION for $app..."
          flyctl volumes create "$NAME" \
            --app "$app" \
            --size "$SIZE" \
            --region "$REGION" \
            --yes

          echo "Done. Current volumes:"
          flyctl volumes list --app "$app"

