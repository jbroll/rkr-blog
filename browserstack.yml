# BrowserStack Automate configuration for Playwright on real iOS Safari.
# Credentials are loaded from environment — set BROWSERSTACK_USERNAME and
# BROWSERSTACK_ACCESS_KEY, or put them in secrets.env (gitignored).
userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

framework: playwright

projectName: rkr-blog
buildName: ios-safari-opfs
buildIdentifier: '#${BUILD_NUMBER}'

# Real iOS devices. playwright-webkit runs in sandboxed non-persistent mode
# and cannot access OPFS at all; real Safari on device has full storage APIs.
platforms:
  - browserName: safari
    osVersion: 18
    deviceName: iPhone 16 Pro Max
  - browserName: safari
    osVersion: 17
    deviceName: iPhone 15 Pro Max

parallelsPerPlatform: 1

# BrowserStack Local: SDK starts/stops the tunnel automatically.
browserstackLocal: true

consoleLogs: errors
testObservability: true
